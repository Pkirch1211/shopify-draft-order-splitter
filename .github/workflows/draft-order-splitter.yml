name: Draft Order Splitter

on:
  workflow_dispatch:
  schedule:
    - cron: "0,30 12-20 * * *"
    - cron: "0 21 * * *"
    - cron: "0,30 22-23 * * *"
    - cron: "0,30 0-4 * * *"
    - cron: "0 5 * * *"

jobs:
  run-splitter:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Debug env presence
        shell: bash
        env:
          SHOPIFY_ADMIN_ACCESS_TOKEN: ${{ secrets.SHOPIFY_ADMIN_ACCESS_TOKEN }}
          SHOPIFY_SHOP: ${{ secrets.SHOPIFY_SHOP }}
          SHOPIFY_LOCATION_ID: ${{ secrets.SHOPIFY_LOCATION_ID }}
          API_VERSION: ${{ vars.API_VERSION }}
        run: |
          echo "SHOPIFY_ADMIN_ACCESS_TOKEN set? -> $([[ -n "$SHOPIFY_ADMIN_ACCESS_TOKEN" ]] && echo YES || echo NO)"
          echo "SHOPIFY_SHOP set? -> $([[ -n "$SHOPIFY_SHOP" ]] && echo YES || echo NO)"
          echo "SHOPIFY_LOCATION_ID set? -> $([[ -n "$SHOPIFY_LOCATION_ID" ]] && echo YES || echo NO)"
          echo "API_VERSION -> ${API_VERSION:-MISSING}"

      - name: Run draft splitter
        env:
          SHOPIFY_ADMIN_ACCESS_TOKEN: ${{ secrets.SHOPIFY_ADMIN_ACCESS_TOKEN }}
          SHOPIFY_SHOP: ${{ secrets.SHOPIFY_SHOP }}
          SHOPIFY_LOCATION_ID: ${{ secrets.SHOPIFY_LOCATION_ID }}

          API_VERSION: ${{ vars.API_VERSION }}
          DRY_RUN: ${{ vars.DRY_RUN }}
          LOG_LEVEL: ${{ vars.LOG_LEVEL }}
          LOOKBACK_DAYS: ${{ vars.LOOKBACK_DAYS }}
          MAX_DRAFTS: ${{ vars.MAX_DRAFTS }}

          IDEMPOTENCY_DONE_TAG: ${{ vars.IDEMPOTENCY_DONE_TAG }}
          PROCESSING_TAG: ${{ vars.PROCESSING_TAG }}
          CHILD_TAG: ${{ vars.CHILD_TAG }}

          DRAFT_ORDER_NAMES: ${{ vars.DRAFT_ORDER_NAMES }}

          ORIGINAL_DRAFT_ID_METAFIELD_NAMESPACE: ${{ vars.ORIGINAL_DRAFT_ID_METAFIELD_NAMESPACE }}
          ORIGINAL_DRAFT_ID_METAFIELD_KEY: ${{ vars.ORIGINAL_DRAFT_ID_METAFIELD_KEY }}
          ORIGINAL_DRAFT_ID_METAFIELD_TYPE: ${{ vars.ORIGINAL_DRAFT_ID_METAFIELD_TYPE }}

          PO_METAFIELD_NAMESPACE: ${{ vars.PO_METAFIELD_NAMESPACE }}
          PO_METAFIELD_KEY: ${{ vars.PO_METAFIELD_KEY }}
          PO_METAFIELD_TYPE: ${{ vars.PO_METAFIELD_TYPE }}

          PAYMENT_TERMS_TEMPLATE_ID: ${{ vars.PAYMENT_TERMS_TEMPLATE_ID }}
          PAYMENT_TERMS_TEMPLATE_ID_NET30: ${{ vars.PAYMENT_TERMS_TEMPLATE_ID_NET30 }}
          PAYMENT_TERMS_TEMPLATE_ID_NET60: ${{ vars.PAYMENT_TERMS_TEMPLATE_ID_NET60 }}
          PAYMENT_TERMS_TEMPLATE_ID_NET90: ${{ vars.PAYMENT_TERMS_TEMPLATE_ID_NET90 }}
          PAYMENT_TERMS_TEMPLATE_ID_NET120: ${{ vars.PAYMENT_TERMS_TEMPLATE_ID_NET120 }}
          SET_PAYMENT_TERMS_ON_CHILDREN: ${{ vars.SET_PAYMENT_TERMS_ON_CHILDREN }}

          PRODUCT_TAG_BUCKET_1: ${{ vars.PRODUCT_TAG_BUCKET_1 }}
          PRODUCT_TAG_BUCKET_2: ${{ vars.PRODUCT_TAG_BUCKET_2 }}
          PRODUCT_TAG_BUCKET_3: ${{ vars.PRODUCT_TAG_BUCKET_3 }}
          PRODUCT_TAG_BUCKET_4: ${{ vars.PRODUCT_TAG_BUCKET_4 }}
          PRODUCT_TAG_BUCKET_5: ${{ vars.PRODUCT_TAG_BUCKET_5 }}
          PRODUCT_TAG_BUCKET_6: ${{ vars.PRODUCT_TAG_BUCKET_6 }}
          PRODUCT_TAG_BUCKET_7: ${{ vars.PRODUCT_TAG_BUCKET_7 }}
          PRODUCT_TAG_BUCKET_8: ${{ vars.PRODUCT_TAG_BUCKET_8 }}
          PRODUCT_TAG_BUCKET_9: ${{ vars.PRODUCT_TAG_BUCKET_9 }}
          PRODUCT_TAG_BUCKET_10: ${{ vars.PRODUCT_TAG_BUCKET_10 }}

        run: |
          python shopify-adjust-orders.py
