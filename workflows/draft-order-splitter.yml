name: Draft Order Splitter

on:
  workflow_dispatch:
  schedule:
    - cron: "0,30 12-20 * * *"
    - cron: "0 21 * * *"
    - cron: "0,30 22-23 * * *"
    - cron: "0,30 0-4 * * *"
    - cron: "0 5 * * *"

jobs:
  run-splitter:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run draft splitter
        env:
          SHOPIFY_TOKEN: ${{ secrets.SHOPIFY_TOKEN }}
          SHOPIFY_STORE: ${{ secrets.SHOPIFY_STORE }}
          LOCATION_ID: ${{ secrets.LOCATION_ID }}
          API_VERSION: ${{ vars.API_VERSION }}
          DRY_RUN: ${{ vars.DRY_RUN }}
          LOOKBACK_DAYS: ${{ vars.LOOKBACK_DAYS }}
          IDEMPOTENCY_DONE_TAG: ${{ vars.IDEMPOTENCY_DONE_TAG }}
          CHILD_TAG: ${{ vars.CHILD_TAG }}
          MAX_DRAFTS: ${{ vars.MAX_DRAFTS }}
        run: |
          python shopify-adjust-drafts.py
